<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 5px;
            overflow: hidden;
            user-select: none;
        }
        #gameContainer { position: relative; width: 100%; max-width: 800px; margin: 0 auto; }
        canvas {
            background-color: #222;
            border: 3px solid #ff4b4b;
            border-radius: 8px;
            width: 100%;
            height: auto;
        }
        #buttonArea {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .drum-btn {
            flex: 1;
            max-width: 150px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px #333;
        }
        .drum-btn:active { transform: translateY(4px); box-shadow: none; }
        .don-btn { background-color: #ff4757; }
        .ka-btn { background-color: #1e90ff; }
        #instructions { margin-top: 10px; font-size: 13px; color: #aaa; }

        #resultScreen {
            display: none;
            background: linear-gradient(135deg, #cc2e2e, #ff6b6b);
            border: 4px solid #ffd700;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
            animation: popIn 0.5s ease-out;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .result-title {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 0px #000;
            margin-bottom: 15px;
        }
        .result-stats {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            padding: 15px;
            font-size: 18px;
            text-align: left;
            margin-bottom: 20px;
            line-height: 1.8;
        }
        .stat-line { display: flex; justify-content: space-between; border-bottom: 1px dashed #555; }
        .stat-value { font-weight: bold; color: #fffa65; }
        .clear-comment { font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 20px; }
        .retry-btn {
            background-color: #ffd700;
            color: #111;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px #b39600;
        }
    </style>
</head>
<body>
    <div id="gamePlayArea">
        <div id="gameContainer">
            <canvas id="gameCanvas" width="800" height="200"></canvas>
        </div>
        <div id="buttonArea">
            <button class="drum-btn ka-btn" onclick="triggerHit('ka')">カッ (フチ)</button>
            <button class="drum-btn don-btn" onclick="triggerHit('don')">ドン (面)</button>
            <button class="drum-btn don-btn" onclick="triggerHit('don')">ドン (面)</button>
            <button class="drum-btn ka-btn" onclick="triggerHit('ka')">カッ (フチ)</button>
        </div>
        <div id="instructions">
            ※ ボタンか画面クリック、またはキーボードの <span style="background:#444;padding:2px 4px;">D / F / J / K</span> キーで操作
        </div>
    </div>

    <div id="resultScreen">
        <div class="result-title">🥁 結果発表 🥁</div>
        <div id="clearComment" class="clear-comment">演奏終了！</div>
        
        <div class="result-stats">
            <div class="stat-line"><span>最終スコア:</span><span id="resScore" class="stat-value">0</span></div>
            <div class="stat-line"><span>最大コンボ:</span><span id="resCombo" class="stat-value">0</span></div>
            <div class="stat-line"><span>「良」の数:</span><span id="resPerfect" class="stat-value">0</span></div>
            <div class="stat-line"><span>「可」の数:</span><span id="resGood" class="stat-value">0</span></div>
            <div class="stat-line"><span>「不可」の数:</span><span id="resMiss" class="stat-value">0</span></div>
        </div>
        <button class="retry-btn" onclick="clickRetry()">もう一度あそぶ</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let score = 0, combo = 0, maxCombo = 0, currentFrame = 0, judgmentTimer = 0;
        let countPerfect = 0, countGood = 0, countMiss = 0;
        let gameActive = false, lastJudgment = "";
        let notes = [];
        let loadedSongKey = "";
        let isFirstPlay = true;
        
        let laneFlashTimer = 0;
        let laneFlashType = "";

        const TARGET_X = 150, TARGET_Y = 100, TARGET_RADIUS = 30, NOTE_SPEED = 5;
        let chartData = [];

        function checkSongSync() {
            if (window.CURRENT_SONG_KEY && window.CURRENT_SONG_KEY !== loadedSongKey) {
                loadedSongKey = window.CURRENT_SONG_KEY;
                resetToTitle();
            }
        }

        function resetToTitle() {
            const origData = window.PYTHON_CHART_DATA || [];
            chartData = origData.map(n => ({...n}));
            
            score = 0; combo = 0; maxCombo = 0; currentFrame = 0;
            countPerfect = 0; countGood = 0; countMiss = 0;
            notes = []; lastJudgment = ""; gameActive = false; isFirstPlay = true;
            laneFlashTimer = 0; laneFlashType = "";
            
            document.getElementById('gamePlayArea').style.display = 'block';
            document.getElementById('resultScreen').style.display = 'none';
        }

        function initGame() {
            const origData = window.PYTHON_CHART_DATA || [];
            chartData = origData.map(n => ({...n}));
            
            score = 0; combo = 0; maxCombo = 0; currentFrame = 0;
            countPerfect = 0; countGood = 0; countMiss = 0;
            notes = []; lastJudgment = ""; isFirstPlay = false;
            laneFlashTimer = 0; laneFlashType = "";
            
            document.getElementById('gamePlayArea').style.display = 'block';
            document.getElementById('resultScreen').style.display = 'none';
            gameActive = true;
        }

        function triggerHit(type) {
            if (!gameActive) {
                initGame();
                return;
            }
            laneFlashType = type;
            laneFlashTimer = 6;
            checkHit(type);
        }

        window.addEventListener('keydown', (e) => {
            let inputType = "";
            if (e.key === 'f' || e.key === 'j' || e.key === 'F' || e.key === 'J') inputType = "don";
            else if (e.key === 'd' || e.key === 'k' || e.key === 'D' || e.key === 'K') inputType = "ka";
            if (inputType !== "") triggerHit(inputType);
        });

        canvas.addEventListener('click', () => { if (!gameActive) initGame(); });

        // 🛠️ 最大のバグ修正箇所：notes[0] で正しく1番目の音符を狙い撃ち
        function checkHit(type) {
            if (!notes || notes.length === 0) return;
            let closestNote = notes[0]; // タイポを確実に修正しました
            if (!closestNote) return;

            let distance = Math.abs(closestNote.x - TARGET_X);

            if (distance < 60) {
                if (closestNote.type === type) {
                    if (distance <= 20) { 
                        lastJudgment = "良 (Perfect!)"; score += 100; combo++; countPerfect++; 
                    } else { 
                        lastJudgment = "可 (Good)"; score += 50; combo++; countGood++;
                    }
                    if (combo > maxCombo) maxCombo = combo;
                    notes.shift();
                } else { 
                    lastJudgment = "不可 (Miss)"; 
                    combo = 0; 
                    countMiss++;
                }
                judgmentTimer = 25;
            }
        }

        function showResults() {
            gameActive = false;
            document.getElementById('gamePlayArea').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            
            document.getElementById('resScore').innerText = score;
            document.getElementById('resCombo').innerText = maxCombo;
            document.getElementById('resPerfect').innerText = countPerfect;
            document.getElementById('resGood').innerText = countGood;
            document.getElementById('resMiss').innerText = countMiss;
            
            let comment = "演奏終了！お疲れ様！";
            if (countMiss === 0 && (countPerfect + countGood) > 0) {
                comment = "✨ フルコンボ！神がかった腕前！ ✨";
            } else if (score > 500) {
                comment = "🔥 大成功！お見事ドどん！ 🔥";
            }
            document.getElementById('clearComment').innerText = comment;
        }

        function clickRetry() {
            initGame();
        }

        function gameLoop() {
            try {
                checkSongSync();

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#333';
                ctx.fillRect(0, 50, canvas.width, 100);

                // 判定枠の描画
                ctx.beginPath();
                ctx.arc(TARGET_X, TARGET_Y, TARGET_RADIUS, 0, Math.PI * 2);
                if (laneFlashTimer > 0) {
                    ctx.fillStyle = laneFlashType === 'don' ? 'rgba(255, 71, 87, 0.6)' : 'rgba(30, 144, 255, 0.6)';
                    ctx.fill();
                    laneFlashTimer--;
                } else {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                    ctx.fill();
                }
