<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 5px;
            overflow: hidden;
            user-select: none;
        }
        #gameContainer { position: relative; width: 100%; max-width: 800px; margin: 0 auto; }
        canvas {
            background-color: #222;
            border: 3px solid #ff4b4b;
            border-radius: 8px;
            width: 100%;
            height: auto;
        }
        #buttonArea {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .drum-btn {
            flex: 1;
            max-width: 150px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px #333;
        }
        .drum-btn:active { transform: translateY(4px); box-shadow: none; }
        .don-btn { background-color: #ff4757; }
        .ka-btn { background-color: #1e90ff; }
        #instructions { margin-top: 10px; font-size: 13px; color: #aaa; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="200"></canvas>
    </div>

    <div id="buttonArea">
        <button class="drum-btn ka-btn" onclick="triggerHit('ka')">カッ (フチ)</button>
        <button class="drum-btn don-btn" onclick="triggerHit('don')">ドン (面)</button>
        <button class="drum-btn don-btn" onclick="triggerHit('don')">ドン (面)</button>
        <button class="drum-btn ka-btn" onclick="triggerHit('ka')">カッ (フチ)</button>
    </div>

    <div id="instructions">
        ※ 画面内のボタンを押すか、ゲーム画面をクリックした後にキーボードの <span style="background:#444;padding:2px 4px;">D / F / J / K</span> キーで操作できます。
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let score = 0, combo = 0, maxCombo = 0, currentFrame = 0, judgmentTimer = 0;
        let gameActive = false, lastJudgment = "";
        let notes = [];
        let loadedSongKey = "";
        
        const TARGET_X = 150, TARGET_Y = 100, TARGET_RADIUS = 30, NOTE_SPEED = 5;
        let chartData = [];

        function checkSongSync() {
            if (window.CURRENT_SONG_KEY && window.CURRENT_SONG_KEY !== loadedSongKey) {
                loadedSongKey = window.CURRENT_SONG_KEY;
                chartData = JSON.parse(JSON.stringify(window.PYTHON_CHART_DATA || []));
                score = 0; combo = 0; maxCombo = 0; currentFrame = 0;
                notes = []; lastJudgment = ""; gameActive = false;
            }
        }

        function initGame() {
            checkSongSync();
            chartData = JSON.parse(JSON.stringify(window.PYTHON_CHART_DATA || []));
            score = 0; combo = 0; maxCombo = 0; currentFrame = 0;
            notes = []; lastJudgment = ""; gameActive = true;
        }

        function triggerHit(type) {
            if (!gameActive) {
                initGame();
                return;
            }
            checkHit(type);
        }

        window.addEventListener('keydown', (e) => {
            let inputType = "";
            if (e.key === 'f' || e.key === 'j' || e.key === 'F' || e.key === 'J') inputType = "don";
            else if (e.key === 'd' || e.key === 'k' || e.key === 'D' || e.key === 'K') inputType = "ka";
            if (inputType !== "") triggerHit(inputType);
        });

        canvas.addEventListener('click', () => { if (!gameActive) initGame(); });

        function checkHit(type) {
            if (notes.length === 0) return;
            let closestNote = notes[0];
            let distance = Math.abs(closestNote.x - TARGET_X);

            if (distance < 60) {
                if (closestNote.type === type) {
                    if (distance <= 20) { lastJudgment = "良 (Perfect!)"; score += 100; combo++; }
                    else { lastJudgment = "可 (Good)"; score += 50; combo++; }
                    if (combo > maxCombo) maxCombo = combo;
                } else { lastJudgment = "不可 (Miss)"; combo = 0; }
                judgmentTimer = 25;
                notes.shift();
            }
        }

        function gameLoop() {
            checkSongSync();

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#333';
            ctx.fillRect(0, 50, canvas.width, 100);

            ctx.beginPath();
            ctx.arc(TARGET_X, TARGET_Y, TARGET_RADIUS, 0, Math.PI * 2);
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 4;
            ctx.stroke();

            if (gameActive) {
                currentFrame++;
                
                // 大量ノーツ時の負荷軽減のため、直近で出現するノーツだけを効率よく配列に移す
                while(chartData.length > 0 && chartData[0].frame === currentFrame) {
                    notes.push({ x: canvas.width + 20, type: chartData[0].type });
                    chartData.shift();
                }

                for (let i = notes.length - 1; i >= 0; i--) {
                    notes[i].x -= NOTE_SPEED;
                    ctx.beginPath();
                    ctx.arc(notes[i].x, TARGET_Y, TARGET_RADIUS - 5, 0, Math.PI * 2);
                    ctx.fillStyle = notes[i].type === 'don' ? '#ff4757' : '#1e90ff';
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    if (notes[i].x < TARGET_X - 60) {
                        notes.splice(i, 1);
                        lastJudgment = "不可 (Miss)";
                        combo = 0;
                        judgmentTimer = 25;
                    }
                }

                // 全ノーツを消化しきったらゲームクリア
                if (chartData.length === 0 && notes.length === 0) {
                    gameActive = false;
                }
            }

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px Arial';
            ctx.fillText(`スコア: ${score}`, 20, 35);
            ctx.fillText(`最大コンボ: ${maxCombo}`, 200, 35);

            if (combo > 0) {
                ctx.fillStyle = '#ffa500';
                ctx.font = 'italic bold 24px Arial';
                ctx.fillText(`${combo} コンボ`, TARGET_X - 40, TARGET_Y - 45);
            }

            if (judgmentTimer > 0) {
                ctx.font = 'bold 20px Arial';
                ctx.fillStyle = lastJudgment.includes('良') ? '#fffa65' : (lastJudgment.includes('可') ? '#fff' : '#ff4d4d');
                ctx.fillText(lastJudgment, TARGET_X - 40, TARGET_Y + 65);
                judgmentTimer--;
            }

            if (!gameActive) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                if (currentFrame === 0) {
                    ctx.fillText('ボタンを押して演奏開始（音楽なし・1500ノーツ）', canvas.width / 2, canvas.height / 2 + 10);
                } else {
                    ctx.fillText('演奏終了！お疲れ様でした！', canvas.width / 2, canvas.height / 2 - 30);
                    ctx.font = '20px Arial';
                    ctx.fillText(`最終スコア: ${score}  /  最大コンボ: ${maxCombo}`, canvas.width / 2, canvas.height / 2 + 10);
                }
                ctx.textAlign = 'left';
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
